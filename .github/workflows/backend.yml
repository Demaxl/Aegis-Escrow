name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aegis
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aegis -d aegis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aegis:aegis_dev_password@localhost:5432/aegis
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Ruff
        working-directory: backend
        run: ruff check .

      - name: Django check
        working-directory: backend
        run: python manage.py check

      - name: Pytest
        working-directory: backend
        run: pytest
