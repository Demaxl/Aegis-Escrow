name: Contracts CI

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Format check
        working-directory: contracts
        run: forge fmt --check

      - name: Build
        working-directory: contracts
        run: forge build --sizes

      - name: Test
        working-directory: contracts
        run: forge test -vvv
